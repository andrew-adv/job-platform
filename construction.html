<!DOCTYPE html>
<html lang="en">

<head>

    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive -->
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Under Construction | JobPlatform</title>

    <!-- Icons -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css"
    >

    <!-- CSS -->
    <link
        rel="stylesheet"
        href="./css/construction.css"
    >

</head>

<body>

    <!-- =====================================
         Construction
    ====================================== -->

    <main class="construction">

        <section class="construction-card">

            <!-- Icon -->

            <div class="construction-icon">

                <i class="fa-solid fa-screwdriver-wrench"></i>

            </div>


            <!-- Heading -->

            <h1>
                This Page is Under Construction
            </h1>


            <!-- Description -->

            <p>

                We're currently building this feature.

                <br><br>

                Thanks for checking it out.
                It'll be available in a future update.

            </p>


            <!-- Progress -->

            <div class="progress">

                <h3>Project Progress</h3>

                <ul>

                    <li>
                        <i class="fa-solid fa-check"></i>
                        Homepage
                    </li>

                    <li>
                        <i class="fa-solid fa-check"></i>
                        Featured Jobs
                    </li>

                    <li>
                        <i class="fa-solid fa-check"></i>
                        Newsletter
                    </li>

                    <li>
                        <i class="fa-solid fa-clock"></i>
                        Job Details
                    </li>

                    <li>
                        <i class="fa-solid fa-clock"></i>
                        Login System
                    </li>

                    <li>
                        <i class="fa-solid fa-clock"></i>
                        Saved Jobs
                    </li>

                </ul>

            </div>


            <!-- Buttons -->

            <div class="construction-buttons">

                <a href="index.html">

                    <i class="fa-solid fa-house"></i>

                    Back Home

                </a>

                <a href="index.html#featured-jobs">

                    Browse Jobs

                    <i class="fa-solid fa-arrow-right"></i>

                </a>

            </div>

        </section>

    </main>

</body>

</html>
