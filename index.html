<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Makes the website responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Job Platform</title>

    <!-- Icons -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css"
    >

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="./css/index.css">
</head>

<body>

    <!-- ===============================
         Header
    ================================ -->
    <header>

        <!-- Main navigation -->
        <nav>

            <!-- Logo -->
            <a href="index.html" class="logo">
                <i class="fa-solid fa-briefcase"></i>
                <span>JobPlatform</span>
            </a>


            <!-- Main navigation links -->
            <ul class="nav-links">

                <li>
                    <a href="#">Home</a>
                </li>

                <li>
                    <a href="#">Jobs</a>
                </li>

                <li>
                    <a href="#">About</a>
                </li>

            </ul>


            <!-- Authentication links -->
            <div class="auth-links">

                <a href="#">Login</a>

                <a href="#">Register</a>

            </div>


            <!-- Mobile menu button -->
            <!-- Hidden on desktop -->
            <button class="burger">

                <i class="fa-solid fa-bars"></i>

            </button>

        </nav>


        <!-- ===============================
             Mobile Navigation
             Hidden by default
        ================================ -->

        <div class="mobile-menu">

            <ul>

                <li><a href="#">Home</a></li>

                <li><a href="#">Jobs</a></li>

                <li><a href="#">About</a></li>

            </ul>

            <div class="auth-links">

                <a href="#">Login</a>

                <a href="#">Register</a>

            </div>

        </div>

    </header>

    <!-- =====================================
     Main Content
====================================== -->
<main>

    <!-- =====================================
         Hero Section
    ====================================== -->
    <!-- 
        Hero
        │
        ├── Container
        │
        │   ├── Badge (optional)
        │   │
        │   ├── Heading
        │   │
        │   ├── Paragraph
        │   │
        │   ├── Search Card
        │   │      ├── Job input
        │   │      ├── Location input
        │   │      └── Search button
        │   │
        │   └── Stats
        │
        └── Background decoration
     -->
    <section class="hero">

        <!-- Limits the width of the hero content -->
        <div class="container">

            <!-- Main heading -->
            <h1>
                Find Your Next
                <span>Opportunity</span>
            </h1>

            <!-- Supporting text -->
            <p>
                Search thousands of job openings from top companies.
            </p>


            <!-- =====================================
                 Search Form
            ====================================== -->

            <!--
                NOTE:
                This should eventually become a <form>.
                Using a form makes the search accessible and
                allows the Enter key to submit automatically.
            -->

            <form class="search-bar">

                <!-- Job Title -->
                <div class="input-group border-right">

                    <i class="fa-solid fa-magnifying-glass"></i>

                    <input
                        type="text"
                        placeholder="Job title or keyword"
                    >

                </div>


                <!-- Location -->
                <div class="input-group">

                    <i class="fa-solid fa-location-dot"></i>

                    <input
                        type="text"
                        placeholder="Location or Remote"
                    >

                </div>


                <!-- Search Button -->
                <button class="search-btn" type="submit">

                    Search Jobs

                </button>

            </form>


            <!-- Hero statistics (coming later) -->
        </div>

    </section>



<!-- =====================================
         Featured Jobs Section
    ====================================== -->
    <section class="featured-jobs">
        <div class="featured-jobs-header">
            <h2>Featured Jobs</h2>
        </div>
        <div class="jobs-container">

            <article class="job-card">

                <div class="job-card-header">
                
                    <div class="logo-container">
                    <img   src="https://lh3.googleusercontent.com/aida-public/AB6AXuDfZbCaXQB5mzkFUspd2Sq9bJ5_HUtLDMDHAC73NCFbTIVw0nuea2RzNVT2Fi6afVIoIF34kMuvoLxW2EkaGB_KEwyr-g5hzbJ024p90X2eXOLiXjWeU2Wn3vy8jDAO-F78F8d-jJXhtB-19li2E7yzVg77VBuUaecw0IKQOthMA2xBy7hqbHe-FId5JuK38VWl7PA0to5-q_LY5tEbMOAylxXauzwM8q1CZiubIH8vjzN-JNoax_1nKloZhkxayxtoaD4Bb0f-pw">
                    </div>
                    <span class="px-3 py-1 bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 text-xs font-bold rounded-full">Full Time</span>

                </div>

                <h4>Backend Engineer (Go)</h4>

                <p>Stripe • Remote, Global</p>

                <div class="skills">
                    <span >Golang</span>
                    <span >Kubernetes</span>
                </div>


                <div class="job-card-footer">
                    <span>$160k - $210k</span>
                    <button>View Details</button>
                </div>

            </article>
        </div>
    </section>
</main>
<br><br>
<br><br>
<br><br>
<br><br>
<br><br>
    <script src="./js/index.js"></script>
</body>
</html>
