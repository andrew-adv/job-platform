<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Makes the website responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Job Platform</title>

    <!-- Icons -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.3.0/css/all.min.css"
    >

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="./css/index.css">
</head>

<body>

    <!-- ===============================
         Header
    ================================ -->
    <header>

        <!-- Main navigation -->
        <nav>

            <!-- Logo -->
            <a href="index.html" class="logo">
                <i class="fa-solid fa-briefcase"></i>
                <span>JobPlatform</span>
            </a>


            <!-- Main navigation links -->
            <ul class="nav-links">

                <li>
                    <a href="#">Home</a>
                </li>

                <li>
                    <a href="#">Jobs</a>
                </li>

                <li>
                    <a href="#">About</a>
                </li>

            </ul>


            <!-- Authentication links -->
            <div class="auth-links">

                <a href="#">Login</a>

                <a href="#">Register</a>

            </div>


            <!-- Mobile menu button -->
            <!-- Hidden on desktop -->
            <button class="burger">

                <i class="fa-solid fa-bars"></i>

            </button>

        </nav>


        <!-- ===============================
             Mobile Navigation
             Hidden by default
        ================================ -->

        <div class="mobile-menu">

            <ul>

                <li><a href="#">Home</a></li>

                <li><a href="#">Jobs</a></li>

                <li><a href="#">About</a></li>

            </ul>

            <div class="auth-links">

                <a href="#">Login</a>

                <a href="#">Register</a>

            </div>

        </div>

    </header>

    <!-- =====================================
     Main Content
====================================== -->
<main>

    <!-- =====================================
         Hero Section
    ====================================== -->
    <!-- 
        Hero
        │
        ├── Container
        │
        │   ├── Badge (optional)
        │   │
        │   ├── Heading
        │   │
        │   ├── Paragraph
        │   │
        │   ├── Search Card
        │   │      ├── Job input
        │   │      ├── Location input
        │   │      └── Search button
        │   │
        │   └── Stats
        │
        └── Background decoration
     -->
    <section class="hero">

        <!-- Limits the width of the hero content -->
        <div class="container">

            <!-- Main heading -->
            <h1>
                Find Your Next
                <span>Opportunity</span>
            </h1>

            <!-- Supporting text -->
            <p>
                Search thousands of job openings from top companies.
            </p>


            <!-- =====================================
                 Search Form
            ====================================== -->

            <!--
                NOTE:
                This should eventually become a <form>.
                Using a form makes the search accessible and
                allows the Enter key to submit automatically.
            -->

            <form class="search-bar">

                <!-- Job Title -->
                <div class="input-group border-right">

                    <i class="fa-solid fa-magnifying-glass"></i>

                    <input
                        type="text"
                        placeholder="Job title or keyword"
                    >

                </div>


                <!-- Location -->
                <div class="input-group">

                    <i class="fa-solid fa-location-dot"></i>

                    <input
                        type="text"
                        placeholder="Location or Remote"
                    >

                </div>


                <!-- Search Button -->
                <button class="search-btn" type="submit">

                    Search Jobs

                </button>

            </form>


            <!-- Hero statistics (coming later) -->
        </div>

    </section>


    <!-- =====================================
     Featured Jobs
===================================== -->

<section class="featured-jobs">

    <header class="section-header">

        <h2>Featured Jobs</h2>

        <div class="featured-controls">

        <button class="prev-btn">
            <i class="fa-solid fa-chevron-left"></i>
        </button>

        <button class="next-btn">
            <i class="fa-solid fa-chevron-right"></i>
        </button>

    </div>
    </header>

    <div class="jobs-container"></div>

    
</section>
</main>
<br><br>
<br><br>
<br><br>
<br><br>
<br><br>


    <script src="./js/jobs.js"></script>
    <script src="./js/index.js"></script>

</body>
</html>
